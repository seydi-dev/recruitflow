name: RecruitFlow CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: recruitflow
          POSTGRES_PASSWORD: recruitflow
          POSTGRES_DB: recruitflow_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U recruitflow -d recruitflow_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: recruit-flow-front/package-lock.json

      - name: Install frontend dependencies
        working-directory: recruit-flow-front
        run: npm ci

      - name: Run frontend unit tests
        working-directory: recruit-flow-front
        run: npm run test -- --runInBand

      - name: Build Angular
        working-directory: recruit-flow-front
        run: npm run build -- --configuration production

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend dependencies
        working-directory: RecruitFlow.API
        run: dotnet restore

      - name: Build backend
        working-directory: RecruitFlow.API
        run: dotnet build --no-restore

      - name: Start backend API
        working-directory: RecruitFlow.API
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5072
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=recruitflow_db;Username=recruitflow;Password=recruitflow
        run: dotnet run --no-build &

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: recruit-flow-front
          start: npm start
          wait-on: 'http://localhost:4200, http://localhost:5072/swagger'
          wait-on-timeout: 180
          browser: chrome