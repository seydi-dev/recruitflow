name: RecruitFlow Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend test project
        run: dotnet restore RecruitFlow.Tests/RecruitFlow.Tests.csproj

      - name: Build backend test project
        run: dotnet build RecruitFlow.Tests/RecruitFlow.Tests.csproj --no-restore

      - name: Run backend unit tests
        run: dotnet test RecruitFlow.Tests/RecruitFlow.Tests.csproj --no-build --verbosity normal