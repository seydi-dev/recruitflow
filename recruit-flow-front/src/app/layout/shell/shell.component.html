<div class="shell" [class.collapsed]="collapsed()">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">RecruitFlow</span>
      </div>
      <button class="collapse-btn" (click)="toggleSidebar()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline [attr.points]="collapsed() ? '9 18 15 12 9 6' : '15 18 9 12 15 6'"/>
        </svg>
      </button>
    </div>

    <nav class="nav">
      @for (section of navSections; track section.label) {
        <div class="nav-group">
          <span class="nav-group-label">{{ section.label }}</span>
          @for (item of section.items; track item.path) {
            <a class="nav-item" [routerLink]="item.path" routerLinkActive="active" [title]="collapsed() ? item.label : ''">
              <span class="nav-icon" [innerHTML]="item.icon"></span>
              <span class="nav-text">{{ item.label }}</span>
            </a>
          }
        </div>
      }
    </nav>

    <div class="sidebar-bottom">
      <div class="user-row">
        <div class="user-avatar">{{ userInitials() }}</div>
        <div class="user-info">
          <span class="user-name">{{ userName() }}</span>
          <span class="user-role">{{ userRole() }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" [title]="collapsed() ? 'Déconnexion' : ''">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="nav-text">Déconnexion</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-wrapper">
      <router-outlet />
    </div>
  </main>
</div>
<app-toast />
